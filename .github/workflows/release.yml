name: Create Release

on:
  push:
    paths:
      - 'addons/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Get changed addon
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- addons/ | head -1 | cut -d'/' -f2)
          echo "addon=$CHANGED" >> $GITHUB_OUTPUT
          
      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'version.*?\(\K[0-9, ]+' addons/${{ steps.changed.outputs.addon }}/__init__.py | tr -d ' ' | tr ',' '.')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check
        run: |
          TAG="${{ steps.changed.outputs.addon }}-v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists!"
            echo "ERROR: Change version number in __init__.py before committing."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Zip addon
        run: |
          cd addons
          zip -r "${{ steps.changed.outputs.addon }}.zip" "${{ steps.changed.outputs.addon }}"
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.changed.outputs.addon }}-v${{ steps.version.outputs.version }}
          name: ${{ steps.changed.outputs.addon }} v${{ steps.version.outputs.version }}
          files: addons/${{ steps.changed.outputs.addon }}.zip
